[buildout]
extends = dev.cfg

[instance]
http-address = 8012

[settings]
user = admin:admin
hostname = jenkins-syslab
supervisor-port = 9004
zeo-address = 8102

recensio.external_url = http://recensio.local.neon-cathedral.net
altertum.external_url = http://altertum.local.neon-cathedral.net
regio.external_url = http://regio.local.neon-cathedral.net

recensio-policy-config =
    <product-config recensio.policy>
        portals recensio,altertum,regio

        recensio.external_url ${settings:recensio.external_url}
        altertum.external_url ${settings:altertum.external_url}
        regio.external_url ${settings:regio.external_url}

        solr_host ${settings:solr-test-host}
        solr_port ${settings:solr-test-port}
    </product-config>


[supervisor]
programs =
    10 zeo      ${buildout:directory}/bin/runzeo [-C ${buildout:directory}/parts/zeo/zeo.conf] true
    10 solr     (stdout_logfile=${buildout:directory}/var/log/solr.log stderr_logfile=${buildout:directory}/var/log/solr.log) /usr/bin/env [java -Xms512m -Xmx2048m -jar start.jar --module=http jetty.host=${solr-test-instance:host} jetty.port=${solr-test-instance:port}] ${solr-test-instance:location} true
    20 instance (stdout_logfile=${buildout:directory}/var/log/instance.log stderr_logfile=${buildout:directory}/var/log/instance.log) ${buildout:directory}/bin/instance [console] true

